<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="luckdate — Feel Alive. Meet luckdate.">
  <meta name="theme-color" content="#3D3428">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="luckdate">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>luckdate</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #3D3428;
      overscroll-behavior: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(180deg, #5C5042 0%, #3D3428 55%, #2A2418 100%);
    }
    #loading img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    #loading .fallback {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Montserrat, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 24px;
    }
    #loading.fallback-active img { display: none; }
    #loading.fallback-active .fallback { display: flex; }
    #loading .fallback h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 500;
    }
    #loading .fallback p {
      margin: 0;
      font-size: 22px;
      font-weight: 400;
      opacity: 0.95;
    }
    #loading .fallback .brand {
      position: absolute;
      bottom: 48px;
      font-size: 18px;
      letter-spacing: 5px;
      color: #D4A853;
      font-weight: 300;
    }
    @media (min-width: 500px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #E7DED2;
      }
      #loading {
        position: relative;
        width: 100%;
        max-width: 430px;
        height: 100vh;
        max-height: 932px;
        border-radius: 24px;
        box-shadow: 0 12px 48px rgba(92, 70, 53, 0.12);
      }
      flt-glass-pane, flutter-view, #flutter_target {
        max-width: 430px;
        margin: 0 auto;
        box-shadow: 0 12px 48px rgba(92, 70, 53, 0.12);
        border-radius: 24px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img id="splash-img" alt="Feel Alive. Meet luckdate.">
    <div class="fallback">
      <h1>Feel Alive.</h1>
      <p>Meet luckdate.</p>
      <div class="brand">luckdate</div>
    </div>
  </div>
  <script>
    (function () {
      var base = document.querySelector('base');
      var href = base ? base.getAttribute('href') : '/';
      if (!href.endsWith('/')) href += '/';
      var img = document.getElementById('splash-img');
      var loading = document.getElementById('loading');
      img.src = href + 'splash_screen.png';
      img.onerror = function () {
        loading.classList.add('fallback-active');
      };
    })();

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    }
    window.addEventListener('flutter-first-frame', hideLoading);
    document.getElementById('loading').addEventListener('click', hideLoading);
    setTimeout(hideLoading, 10000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
