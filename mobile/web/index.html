<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="luckdate — The House of Vitality">
  <meta name="theme-color" content="#5E6B45">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="luckdate">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>luckdate</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #FFFDF7;
      overscroll-behavior: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #5C4635;
      background: linear-gradient(180deg, #FFFDF7 0%, #FBF7EE 60%, #F3E8CF 100%);
      cursor: pointer;
    }
    #loading .symbol-wrap {
      width: 168px;
      height: 168px;
      border-radius: 999px;
      border: 1px solid rgba(245, 197, 66, 0.32);
      background: rgba(245, 197, 66, 0.08);
      box-shadow: 0 10px 36px rgba(92, 70, 53, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    #loading .symbol-wrap::before {
      content: '';
      position: absolute;
      width: 184px;
      height: 184px;
      border-radius: 999px;
      border: 1px solid rgba(245, 197, 66, 0.2);
    }
    #loading .symbol {
      width: 132px;
      height: 132px;
      object-fit: contain;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    #loading h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 6px;
      color: #5C4635;
    }
    #loading p {
      margin: 0;
      font-size: 14px;
      color: #6B5A49;
    }
    #loading .sub {
      margin-top: 8px;
      font-size: 12px;
      letter-spacing: 1.4px;
      color: #8A7966;
    }
    #loading .line {
      width: 52px;
      height: 1px;
      background: rgba(245, 197, 66, 0.65);
      margin: 14px 0;
    }
    #loading .hint {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(107, 90, 73, 0.45);
    }
    @media (min-width: 500px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #E7DED2;
      }
      flt-glass-pane, flutter-view, #flutter_target {
        max-width: 430px;
        margin: 0 auto;
        box-shadow: 0 12px 48px rgba(92, 70, 53, 0.12);
        border-radius: 24px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="symbol-wrap">
      <img class="symbol" src="assets/assets/images/super_symbol.png" alt="luckdate symbol">
    </div>
    <h1>luckdate</h1>
    <p class="sub">The House of Vitality</p>
    <div class="line"></div>
    <p>Grow Toward the Light</p>
    <p class="hint">Loading...</p>
  </div>
  <script>
    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    }
    window.addEventListener('flutter-first-frame', hideLoading);
    document.getElementById('loading').addEventListener('click', hideLoading);
    setTimeout(hideLoading, 10000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
